<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="bg-base-200 min-h-screen">

    <header class="bg-base-100 border-b border-gray-300 sticky top-0 z-50">
        <section class="max-w-5xl mx-auto px-5 py-6  md:flex-row justify-between items-center gap-6">
            <h1 class="text-2xl font-bold">JobTracker</h1>
            <div class="grid grid-cols-3 gap-4 w-full md:w-auto text-center">
                <div class="bg-base-200 p-4 rounded-xl">
                    <p class="text-xs font-bold opacity-50 uppercase">Total</p>
                    <h2 id="total-count" class="text-2xl font-bold text-primary">0</h2>
                </div>
                <div class="bg-base-200 p-4 rounded-xl">
                    <p class="text-xs font-bold opacity-50 uppercase text-success">Interview</p>
                    <h2 id="interview-count" class="text-2xl font-bold text-success">0</h2>
                </div>
                <div class="bg-base-200 p-4 rounded-xl">
                    <p class="text-xs font-bold opacity-50 uppercase text-error">Rejected</p>
                    <h2 id="rejected-count" class="text-2xl font-bold text-error">0</h2>
                </div>
            </div>
        </section>
    </header>


    <main class="max-w-5xl mx-auto px-5 py-10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-bold">Available Jobs</h2>
                <div class="tabs tabs-box bg-base-100 p-1 mt-4 rounded-xl w-fit border border-base-300">
                    <button onclick="handleTabSwitch('all')" id="tab-all" class="tab tab-active font-bold">All Tab</button>
                    <button onclick="handleTabSwitch('interview')" id="tab-interview" class="tab font-bold">Interview</button>
                    <button onclick="handleTabSwitch('rejected')" id="tab-rejected" class="tab font-bold">Rejected</button>
                </div>
            </div>
            <div class="text-right">
                <span class="text-neutral/40 font-bold uppercase text-xs tracking-widest">Jobs Found</span>
                <p class="text-2xl font-black text-neutral/70" id="section-count">8</p>
            </div>
        </div>

        <div id="jobs-container" class="grid grid-cols-1 gap-6">
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 bg-base-100 rounded-3xl border-2 border-dashed border-base-300">
            <div class="w-20 opacity-20 mb-4">
                <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" alt="Empty Box">
            </div>
            <h3 class="text-2xl font-bold text-neutral/50">No jobs Available</h3>
            <p class="text-neutral/30">There are currently no items in this category.</p>
        </div>
    </main>



    <script src="script/utilities.js"></script>
    <script src="./script/app.js"></script>
</body>

</html>
